<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengajuan Surat Tugas — Buat</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="page-header">
    </div>

    <div class="page-wrapper">
        <div class="sidebar-left"></div>

        <div class="form-container">
            <h1>Form Pengajuan Surat Tugas</h1>

            <form class="form-body" action="./PengajuanSuratTugas_Read.html">

                <div class="form-group">
                    <label for="pengusul">Nama Pengusul</label>
                    <input type="text" name="pengusul" id="pengusul" placeholder="Masukan nama">
                </div>

                <div class="form-group">
                    <label for="waktuPelaksana">Waktu Pelaksana</label>
                    <input type="date" name="waktuPelaksana" id="waktuPelaksana">
                </div>

                <div class="form-group">
                    <label for="lamaPelaksanaan">Lama Pelaksanaan</label>
                    <input type="text" name="lamaPelaksanaan" id="lamaPelaksanaan" placeholder="contoh: 5 hari">
                </div>

                <div class="form-group">
                    <label for="perihal">Perihal</label>
                    <textarea name="perihal" id="perihal" placeholder="Masukkan Perihal"></textarea>
                </div>

                <div class="form-group">
                    <label for="berkasPendukung">Berkas Pendukung</label>
                    <input type="file" name="berkasPendukung" id="berkasPendukung">
                </div>

                <hr class="form-divider">

                <div class="form-actions">
                    <button class="btn-back" type="button" onclick="history.back()">Kembali</button>
                    <input class="btn-clear" type="reset" value="Clear">
                    <input class="btn-submit" type="submit" value="Submit">
                </div>

            </form>
        </div>

        <div class="sidebar-right"></div>
    </div>
    <script src="script.js"></script>
</body>

</html>
